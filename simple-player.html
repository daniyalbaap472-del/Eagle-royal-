 <!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
        /* Minimal base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: sans-serif;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Header with back button */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-button {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .back-button:hover {
            background: #555;
        }

        /* Channel info – simple line */
        .info {
            font-size: 15px;
            color: #ccc;
        }
        .info span {
            font-weight: 600;
            color: #fff;
        }

        /* Video player */
        video {
            width: 100%;
            background: #000;
            border-radius: 4px;
            display: block;
            /* keep aspect ratio by default */
            object-fit: contain;
        }

        /* Aspect ratio controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 4px;
        }
        .fit-button {
            background: #333;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .fit-button:hover {
            background: #444;
        }
        .fit-button.active {
            background: #FF5722;
            font-weight: 600;
        }

        /* Status message */
        .status {
            text-align: center;
            padding: 8px;
            border-radius: 4px;
            background: rgba(255, 87, 34, 0.1);
            color: #FF5722;
            display: none;
        }
        .status.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
    </style>
 </head>
 <body>
  <div class="container">
   <!-- Back button -->
   <div class="header">
    <button class="back-button">← Back</button>
    <div class="info">
     Channel: <span id="channelName">Loading...</span>
    </div>
   </div>
   <!-- Video element with native controls -->
   <video id="player" controls playsinline crossorigin="anonymous"></video>
   <!-- Aspect ratio buttons -->
   <div class="controls">
    <button class="fit-button active" data-fit="fit">Fit</button>
    <button class="fit-button" data-fit="fill">Fill</button>
    <button class="fit-button" data-fit="stretch">Stretch</button>
   </div>
   <!-- Status overlay -->
   <div id="statusMessage" class="status"></div>
  </div>
  <script>
        (function() {
            const CORS_PROXY_URL = 'https://demonji.onrender.com/cors-proxy.php/';
            const urlParams = new URLSearchParams(window.location.search);
            const streamParam = urlParams.get('s') || '';
            const channelNameParam = urlParams.get('name') || 'Unknown Channel';
            const backUrlParam = urlParams.get('back') || 'MaC.html';

            const player = document.getElementById('player');
            const channelName = document.getElementById('channelName');
            const backButton = document.querySelector('.back-button');
            const statusMessage = document.getElementById('statusMessage');
            const fitButtons = document.querySelectorAll('.fit-button');

            let hls;
            let decodedStreamUrl = '';
            let reconnectAttempts = 0;
            const MAX_RECONNECT_ATTEMPTS = 10;
            const RECONNECT_DELAY = 3000;
            let stallDetector = null;

            // --- Back navigation ---
            backButton.addEventListener('click', function() {
                try {
                    window.location.assign(decodeURIComponent(backUrlParam));
                } catch (_) {
                    window.location.href = 'MaC.html';
                }
            });

            // --- Aspect ratio buttons ---
            fitButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const fit = this.dataset.fit;
                    player.style.objectFit = fit === 'fill' ? 'cover' : fit === 'stretch' ? 'fill' : 'contain';
                    fitButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // --- Channel info ---
            channelName.textContent = decodeURIComponent(channelNameParam);

            // --- Status helpers ---
            function showStatus(msg, isError = false) {
                statusMessage.textContent = msg;
                statusMessage.style.display = 'block';
                statusMessage.className = 'status' + (isError ? ' error' : '');
            }
            function hideStatus() {
                statusMessage.style.display = 'none';
            }

            // --- Stall detector (HEVC/AC3 fallback) ---
            function startStallDetector() {
                stallDetector = setTimeout(() => {
                    if (player.currentTime > 0.1 && player.videoWidth === 0) {
                        if (hls) hls.destroy();
                        clearTimeout(stallDetector);
                        showStatus('Error: Video format (HEVC/H.265) or audio (AC3) not supported by your browser.', true);
                    }
                }, 4000);
            }

            // --- HLS error handling ---
            function handleStreamError() {
                clearTimeout(stallDetector);
                if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    showStatus(`Stream lost. Reconnecting… (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`, true);
                    setTimeout(initHls, RECONNECT_DELAY);
                } else {
                    showStatus('Could not reconnect to the stream.', true);
                }
            }

            // --- HLS initialisation ---
            function initHls() {
                if (!decodedStreamUrl) {
                    showStatus('Error: No stream URL provided.', true);
                    return;
                }

                if (hls) hls.destroy();
                clearTimeout(stallDetector);
                player.pause();
                showStatus('Loading channel…');

                if (Hls.isSupported()) {
                    hls = new Hls({
                        maxBufferLength: 300,
                        maxMaxBufferLength: 600,
                        maxBufferSize: 500 * 1024 * 1024,
                        fragLoadingMaxRetry: 8,
                        lowLatencyMode: true,
                        enableWorker: true,
                        xhrSetup: (xhr, url) => {
                            xhr.open('GET', CORS_PROXY_URL + url, true);
                            xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
                            xhr.setRequestHeader('Referer', 'http://demonji.onrender.com/');
                        }
                    });

                    hls.loadSource(CORS_PROXY_URL + decodedStreamUrl);
                    hls.attachMedia(player);

                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        hideStatus();
                        reconnectAttempts = 0;
                        player.play().catch(() => {
                            showStatus('Autoplay blocked – tap to play.', false);
                        });
                        startStallDetector();
                    });

                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            handleStreamError();
                        }
                    });
                } else {
                    showStatus('HLS is not supported on this browser.', true);
                }
            }

            // --- Decode and start ---
            try {
                decodedStreamUrl = atob(decodeURIComponent(streamParam));
                initHls();
            } catch (e) {
                showStatus('Error: Invalid stream URL format.', true);
            }
        })();
    </script>
  <script>
    (function() {
        'use strict';

        // ─── 1. Disable right‑click (context menu) ───
        document.addEventListener('contextmenu', e => e.preventDefault());

        // ─── 2. Disable text selection (except on form inputs) ───
        document.addEventListener('selectstart', e => {
            if (e.target.closest('input, textarea, [contenteditable="true"]')) return;
            e.preventDefault();
        });

        // ─── 3. Disable dragging of page elements ───
        document.addEventListener('dragstart', e => e.preventDefault());

        // ─── 4. Block keyboard shortcuts that open DevTools or view‑source ───
        //    (We do NOT block Ctrl+C / Ctrl+V / Ctrl+S — they are essential for users)
        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            const ctrl = e.ctrlKey || e.metaKey;
            const shift = e.shiftKey;

            if (key === 'f12' ||
                (ctrl && shift && (key === 'i' || key === 'j')) ||
                (ctrl && key === 'u')) {
                e.preventDefault();
                return false;
            }
        });

        // ─── 5. Block view‑source: protocol (if someone types view-source: in URL) ───
        if (window.location.protocol === 'view-source:') {
            window.location.href = 'about:blank';
        }

        // ─── 6. (Optional) Silence console logging — prevents casual inspection ───
        //     This does not break your site, but makes `console.log` useless.
        const noop = () => {};
        ['log', 'warn', 'error', 'info', 'debug', 'trace', 'dir', 'dirxml', 'table', 'assert', 'count', 'group', 'groupEnd', 'time', 'timeEnd', 'profile', 'profileEnd'].forEach(m => {
            if (console[m]) console[m] = noop;
        });

        // ─── 7. (Safe) DevTools detection using window size difference ───
        //     This is less intrusive and rarely triggers false positives.
        (function detectDevTools() {
            let warned = false;

            function checkSize() {
                // DevTools usually take up at least 200px of width or height.
                const threshold = 200;
                const widthDiff = window.outerWidth - window.innerWidth;
                const heightDiff = window.outerHeight - window.innerHeight;

                if ((widthDiff > threshold || heightDiff > threshold) && !warned) {
                    warned = true;
                    // Instead of wiping the page, we show a subtle overlay
                    // that disappears when they close DevTools.
                    const overlay = document.createElement('div');
                    overlay.id = 'devtools-overlay';
                    overlay.style.cssText = `
                        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                        background: rgba(0,0,0,0.85);
                        display: flex; justify-content: center; align-items: center;
                        z-index: 999999;
                        color: #ff4444;
                        font-family: sans-serif;
                        font-size: 1.5rem;
                        flex-direction: column;
                        text-align: center;
                        padding: 20px;
                        backdrop-filter: blur(4px);
                    `;
                    overlay.innerHTML = `
                        <h1 style="font-size: 2.5rem; margin: 0;">⛔ Developer Tools Detected</h1>
                        <p style="color: #aaa; max-width: 500px;">Please close the developer tools to continue using this site.</p>
                        <p style="color: #666; font-size: 0.9rem; margin-top: 20px;">(This overlay will disappear automatically when you close them.)</p>
                    `;
                    document.body.appendChild(overlay);

                    // Re-check every second; remove overlay if tools are closed.
                    const interval = setInterval(() => {
                        const newWidthDiff = window.outerWidth - window.innerWidth;
                        const newHeightDiff = window.outerHeight - window.innerHeight;
                        if (newWidthDiff <= threshold && newHeightDiff <= threshold) {
                            const el = document.getElementById('devtools-overlay');
                            if (el) el.remove();
                            clearInterval(interval);
                            warned = false;
                        }
                    }, 1000);
                }
            }

            // Check on resize and periodically
            window.addEventListener('resize', checkSize);
            setInterval(checkSize, 2000);
            // Initial check after a short delay
            setTimeout(checkSize, 500);
        })();

        console.log('🛡️ Protection active (user‑friendly mode)');
    })();
</script>
 </body>
</html>
